<svg id="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
                    <defs>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Dancing+Script:wght@700&amp;display=swap');
                            .main-text { font-family: 'Dancing Script', cursive; font-size: 60px; font-weight: 700; fill: #7e2626d5; }
                            .sub-text { font-family: 'Caveat', cursive; font-size: 26px; font-weight: 400; fill: #7e2626d5; letter-spacing: 1px; }
                        </style>
                        <!-- Reusable Heart Shape (using cream accent color) -->
                        <path id="h" d="M -8 -4 A 4 4 0 0 1 0 -4 A 4 4 0 0 1 8 -4 Q 8 1 0 7 Q -8 1 -8 -4 Z" fill="#f8f3ee"/>
                    </defs>

                    <!-- Background removed for transparency -->

                    <!-- Top Box Background -->
                    <path d="M 175 180 Q 300 175 425 180 L 425 240 Q 395 255 365 240 T 300 240 T 235 240 T 175 240 Z" fill="#7e2626" opacity="0.2"/>
                    
                    <!-- Bottom Box Background -->
                    <path d="M 175 320 L 425 320 L 425 400 Q 300 405 175 400 Z" fill="#7e2626" opacity="0.2"/>

                    <!-- Hearts Scattered on Top Box -->
                    <use href="#h" transform="translate(200, 205) scale(0.8) rotate(-15)"/>
                    <use href="#h" transform="translate(235, 225) scale(0.6) rotate(15)"/>
                    <use href="#h" transform="translate(270, 195) scale(0.9) rotate(-5)"/>
                    <use href="#h" transform="translate(320, 225) scale(0.7) rotate(20)"/>
                    <use href="#h" transform="translate(370, 200) scale(0.8) rotate(-10)"/>
                    <use href="#h" transform="translate(405, 225) scale(0.7) rotate(10)"/>

                    <!-- Hearts Scattered on Bottom Box -->
                    <use href="#h" transform="translate(195, 345) scale(0.8) rotate(15)"/>
                    <use href="#h" transform="translate(225, 380) scale(0.6) rotate(-20)"/>
                    <use href="#h" transform="translate(270, 345) scale(0.9) rotate(5)"/>
                    <use href="#h" transform="translate(320, 375) scale(0.7) rotate(-15)"/>
                    <use href="#h" transform="translate(370, 340) scale(0.8) rotate(10)"/>
                    <use href="#h" transform="translate(405, 380) scale(0.8) rotate(-5)"/>
                    <use href="#h" transform="translate(280, 385) scale(0.7) rotate(25)"/>

                    <!-- Ribbon Lines and Bows -->
                    <g fill="none" stroke="#7e2626d5" stroke-linecap="round" stroke-linejoin="round">
                        
                        <!-- Top Box Wavy Bottom Edge -->
                        <path d="M 175 240 Q 205 225 235 240 T 300 240 T 365 240 T 425 240" stroke-width="10"/>

                        <!-- Bottom Box Straight Top Edge -->
                        <path d="M 175 320 L 425 320" stroke-width="12"/>

                        <!-- Vertical Ribbons wrapping the box -->
                        <path d="M 300 180 L 300 240" stroke-width="12"/>
                        <path d="M 300 320 L 300 400" stroke-width="12"/>

                        <!-- Main Bow Loops -->
                        <path d="M 300 180 C 260 50 140 100 300 180" stroke-width="12"/>
                        <path d="M 300 180 C 340 50 460 100 300 180" stroke-width="12"/>

                        <!-- Ribbon Tails curving outwards -->
                        <path d="M 300 180 Q 250 250 170 230 Q 120 215 110 270" stroke-width="10"/>
                        <path d="M 300 180 Q 360 250 440 220 Q 480 205 510 230" stroke-width="10"/>
                    </g>

                    <!-- Text Elements -->
                    <text x="300" y="295" class="main-text" text-anchor="middle">Dear Larana</text>
                    <text x="300" y="445" class="sub-text" text-anchor="middle">-Make Every Moment Special-</text>
                </svg>